name: Build webconfig Component for Coverity

on:
  push:
    branches: [ main, 'sprint/**', 'release/**', develop, cov ]
  pull_request:
    branches: [ main, 'sprint/**', 'release/**', topic/RDK*, develop, cov ]

jobs:
  build-webcfg-on-pr:
    name: Build webcfg component in github rdkcentral
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rdkcentral/docker-rdk-ci:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: native build
        run: |
          apt-get install -y libssl-dev zlib1g-dev build-essential
          # Trust the workspace
          git config --global --add safe.directory '*'
          # Pull the latest changes for the native build system
          git submodule update --init --recursive --remote
          # Build and install dependencies
          chmod +x build_tools_workflows/cov_docker_script/setup_dependencies.sh
          sed -i 's/\\./\\\\./g' /usr/local/share/cmake-3.17/Modules/FindOpenSSL.cmake
          ./build_tools_workflows/cov_docker_script/setup_dependencies.sh ./cov_docker_script/component_config.json
          # Build component
          chmod +x build_tools_workflows/cov_docker_script/build_native.sh
          ./build_tools_workflows/cov_docker_script/build_native.sh ./cov_docker_script/component_config.json "$(pwd)"
        env:
          GITHUB_TOKEN: ${{ secrets.RDKCM_RDKE }}
          
      - name: Error Log
        if: failure()
        run: |
              LOG_FILE="/__w/webcfg/webcfg/build/_prefix/curl/src/curl-build/CMakeFiles/CMakeError.log"
              if [ -f "$LOG_FILE" ]; then
                echo "--- START OF CMAKE ERROR LOG ---"
                cat "$LOG_FILE"
                echo "--- END OF CMAKE ERROR LOG ---"
              else
                echo "CMakeError.log not found at $LOG_FILE"
                # Optional: find where the log actually is if the path shifted
                find /__w/webcfg/webcfg/build -name "CMakeError.log" -exec cat {} +
              fi          
